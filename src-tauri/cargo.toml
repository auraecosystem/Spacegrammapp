[package]
name = "spacegramm"
version = "1.0.0"
edition = "2026"

[dependencies]
tauri = { version = "2", features = [] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
rusqlite = "0.31"
ed25519-dalek = "2"
rand = "0.8"
tokio-tungstenite = "0.21"
futures-util = "0.3"

[build-dependencies]
tauri-build = { version = "2", features = [] }
